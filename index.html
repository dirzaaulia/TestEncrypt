<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encrypt / Decrypt Tool</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#0f172a; color:#e2e8f0; }
    textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; border-radius: 8px; border: none; }
    button { padding: 10px 16px; margin-right: 10px; border-radius: 8px; border: none; cursor: pointer; }
    .container { max-width: 800px; margin: auto; }
    .card { background:#1e293b; padding:20px; border-radius:16px; margin-bottom:20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 AES Encrypt / Decrypt (Base64)</h2>

    <div class="card">
      <label>Secret Phrase (STRING_PRASE)</label>
      <input id="phrase" style="width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px;" />
    </div>

    <div class="card">
      <label>Input (multi-line supported)</label>
      <textarea id="input"></textarea>

      <button onclick="encrypt()">Encrypt</button>
      <button onclick="decrypt()">Decrypt</button>

      <label>Output</label>
      <textarea id="output"></textarea>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  // IV = 16 bytes 0x00
  const iv = CryptoJS.enc.Hex.parse("00000000000000000000000000000000");

  function getKey(phrase) {
    // MD5 → 16 bytes
    return CryptoJS.MD5(phrase);
  }

  function encrypt() {
    try {
      const phrase = document.getElementById("phrase").value;
      const input = document.getElementById("input").value;

      const key = getKey(phrase);

      // Normalize line endings to match Java (\n)
      const normalizedInput = input.replace(/\r\n/g, "\n");

      const encrypted = CryptoJS.AES.encrypt(normalizedInput, key, {
        iv: iv,
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.Pkcs7
      });

      document.getElementById("output").value = encrypted.toString();
    } catch (e) {
      alert("Encrypt error: " + e);
      console.error(e);
    }
  }

  function decrypt() {
    try {
      const phrase = document.getElementById("phrase").value;
      const input = document.getElementById("input").value;

      const key = getKey(phrase);

      const decrypted = CryptoJS.AES.decrypt(input.trim(), key, {
        iv: iv,
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.Pkcs7
      });

      let result = decrypted.toString(CryptoJS.enc.Utf8);
      // Restore line endings for textarea display
      result = result.replace(/\n/g, "\r\n");
      document.getElementById("output").value = result;
    } catch (e) {
      alert("Decrypt error: " + e);
      console.error(e);
    }
  }
</script>
</body>
</html>
